<!-- 患者管理页面 -->
<div class="bg-white rounded-xl border border-gray-100 shadow-sm">
  <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
    <span id="patient-list-title" class="font-semibold text-gray-700">患者列表</span>
    <div class="flex gap-3 items-center">
      <input id="patient-search" type="text" placeholder="搜索患者编号/首字母…" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm w-52 focus:outline-none focus:border-blue-400" oninput="onPatientSearch(this.value)"/>
      <button onclick="openCreatePatientModal()" class="bg-blue-600 text-white text-sm px-4 py-1.5 rounded-lg hover:bg-blue-700 transition">+ 创建患者</button>
    </div>
  </div>
  <table class="w-full">
    <thead><tr class="bg-gray-50 text-xs text-gray-500">
      <th class="px-5 py-3 text-left font-semibold">患者编号</th>
      <th class="px-4 py-3 text-left font-semibold">姓名首字母</th>
      <th class="px-4 py-3 text-left font-semibold">性别</th>
      <th class="px-4 py-3 text-left font-semibold">年龄</th>
      <th class="px-4 py-3 text-left font-semibold">入组日期</th>
      <th class="px-4 py-3 text-left font-semibold">访视进度</th>
      <th class="px-4 py-3 text-left font-semibold">状态</th>
      <th class="px-4 py-3 text-left font-semibold">操作</th>
    </tr></thead>
    <tbody id="patient-table" class="text-sm text-gray-700 divide-y divide-gray-50">
      <tr><td colspan="8" class="px-5 py-6 text-center text-gray-400 text-sm">加载中…</td></tr>
    </tbody>
  </table>
  <div id="patient-list-footer" class="px-5 py-3 text-xs text-gray-400 border-t border-gray-100">—</div>
</div>

<!-- 创建患者模态框 -->
<div id="modal-create-patient" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center" onclick="if(event.target===this)closeCreatePatientModal()">
  <div class="bg-white rounded-2xl shadow-2xl w-96 p-6">
    <div class="flex items-center justify-between mb-5">
      <div class="font-semibold text-gray-800">创建新患者</div>
      <button onclick="closeCreatePatientModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
    </div>
    <div class="space-y-3">
      <div>
        <label class="text-xs text-gray-500 mb-1 block">姓名首字母 <span class="text-red-400">*</span></label>
        <input id="cp-initials" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="如 AZL"/>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-500 mb-1 block">性别 <span class="text-red-400">*</span></label>
          <select id="cp-gender" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400">
            <option value="">请选择</option>
            <option value="male">男</option>
            <option value="female">女</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-500 mb-1 block">年龄</label>
          <input id="cp-age" type="number" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400" placeholder="岁"/>
        </div>
      </div>
      <div>
        <label class="text-xs text-gray-500 mb-1 block">入组日期</label>
        <input id="cp-enroll" type="date" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
      </div>
      <div id="cp-error" class="text-red-500 text-xs min-h-4"></div>
      <div class="flex gap-3 pt-1">
        <button onclick="closeCreatePatientModal()" class="flex-1 border border-gray-200 text-gray-600 py-2 rounded-lg hover:bg-gray-50 text-sm">取消</button>
        <button id="cp-submit-btn" onclick="submitCreatePatient()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 text-sm">创建患者</button>
      </div>
    </div>
  </div>
</div>
